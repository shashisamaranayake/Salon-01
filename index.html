<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Luxe Beauty Salon</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
color:gold;
font-size:22px;
}

.hero{
height:90vh;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)), url("images/hero.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:40px;
color:gold;
}

section{
padding:60px 20px;
text-align:center;
}

.gallery img{
width:300px;
margin:15px;
border:2px solid gold;
}

button{
padding:10px 25px;
background:gold;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<header>Glow Luxe Beauty Salon</header>

<div class="hero">
<h1>Luxury Beauty Redefined</h1>
</div>

<section>
<h2 style="color:gold;">Our Gallery</h2>
<div class="gallery">
<img src="images/gallery1.jpg">
<img src="images/gallery2.jpg">
</div>
</section>

<section>
<h2 style="color:gold;">Book Appointment</h2>
<button>Book Now</button>
</section>

</body>
</html>
